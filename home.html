<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyFeed</title>
    <script src="./node_modules/axios/dist/axios.min.js"></script>
    <script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="./theme.css">
</head>
<body>
    <!--========== Modals ==========-->
    <div class="modal fade" id="login-Modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Login</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="col-form-label">Email :</label>
                            <input type="text" class="form-control" id="email-input">
                        </div>
                        <div class="mb-3">
                            <label class="col-form-label">Password :</label>
                            <input type="password" class="form-control" id="password-input">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="LoginBtnClicked()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="register-Modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Register A New User</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="col-form-label">Email :</label>
                            <input type="text" class="form-control" id="register-email-input">
                        </div>
                        <div class="mb-3">
                            <label class="col-form-label">Username :</label>
                            <input type="text" class="form-control" id="register-username-input">
                        </div>
                        <div class="mb-3">
                            <label class="col-form-label">Password :</label>
                            <input type="password" class="form-control" id="register-password-input">
                        </div>
                        <div class="mb-3">
                            <label class="col-form-label">Profile Image :</label>
                            <input type="file" class="form-control" id="register-image-input">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="RegisterBtnClicked()">Register</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="create-post-Modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="post-modal-title">Create A New Post</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="col-form-label">Title :</label>
                            <input type="text" class="form-control" id="post-title-input">
                            <input type="hidden" id="post-id-input" value="false">
                        </div>
                        <div class="mb-3">
                            <textarea id="post-body-input" rows="5" class="form-control" style="resize: none;"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="col-form-label">Post Image :</label>
                            <input type="file" class="form-control" id="post-image-input">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="create-post-btn" class="btn btn-primary" onclick="CreateNewPostClicked()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="delete-post-Modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Are you sure you want to delete this post?</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    <input type="hidden" id="delete-post-id">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="delete-post-btn" class="btn btn-danger" onclick="confirmPostDeletion()">Yes Delete</button>
                </div>
            </div>
        </div>
    </div>
    <!--//========== Modals ==========//-->

    <button class="btn btn-primary" id="add-btn" onclick="addPostClicked()">+</button>

    <div class="fade show" id="success-alert"></div>

    <div class="app-shell container py-4">
        <nav class="navbar navbar-expand-lg app-navbar mb-4">
            <div class="container-fluid px-2 px-md-3">
                <a class="navbar-brand" href="home.html">DailyFeed</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end ms-auto">
                        <button id="theme-toggle" type="button" class="btn btn-theme-toggle" onclick="toggleTheme()">Dark</button>
                        <button id="login-btn" type="button" data-bs-toggle="modal" data-bs-target="#login-Modal" class="btn btn-outline-success">Login</button>
                        <button id="register-btn" type="button" data-bs-toggle="modal" data-bs-target="#register-Modal" class="btn btn-outline-success">Register</button>
                        <span class="align-items-center" id="user-div">
                            <img id="nav-user-image" src="" height="40" width="40" class="rounded-circle nav-avatar">
                            <span id="nav-username" class="ms-2 fw-semibold">@user</span>
                        </span>
                        <button onclick="logout()" id="logout-btn" type="button" class="btn btn-outline-danger">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <section class="feed-head mb-3">
            <h1 class="feed-title">DailyFeed</h1>
            <p class="feed-subtitle mb-0">Simple Feed with Daily Updates.</p>
        </section>

        <main>
            <div id="posts"></div>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="mainLogic.js"></script>
    <script src="homeScript.js"></script>
</body>
</html>
